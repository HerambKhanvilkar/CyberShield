
name: Deploy to Azure VM

on:
  push:
    branches: [main, tailwind]
  workflow_dispatch:

jobs:
  deploy-run-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache backend node_modules
        uses: actions/cache@v3
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('**/backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Cache frontend node_modules
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('**/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Create tar file of the repo to transfer
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='frontend/.next' --exclude='coverage' -czf deploy.tar.gz .

      - name: Copy files to Azure VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_AZURE_VM_PEM }}
          source: "deploy.tar.gz"
          target: "/home/${{ secrets.PROD_SERVER_USER }}"

      - name: Run & Deploy on Azure VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_AZURE_VM_PEM }}
          script: |
            # Install Node.js and npm
            if ! command -v node &> /dev/null; then
                curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.0/install.sh | bash
                export NVM_DIR="$HOME/.nvm"
                [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
                [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
                nvm install 20
                node -v
                npm -v
            fi

            # Install PM2
            sudo npm install -g pm2

            # Create app directory if it doesn't exist
            mkdir -p /home/${{ secrets.PROD_SERVER_USER }}/Badge-Viewer

            # Navigate to the app directory
            cd /home/${{ secrets.PROD_SERVER_USER }}/Badge-Viewer

            # Check if unzip is installed, if not, install it
            if ! command -v unzip &> /dev/null; then
                echo "unzip could not be found, installing now..."
                sudo apt-get update
                sudo apt-get install -y unzip
            fi

            # Extract the deployment package
            tar -xzf /home/${{ secrets.PROD_SERVER_USER }}/deploy.tar.gz -C /home/${{ secrets.PROD_SERVER_USER }}/Badge-Viewer

            # Set ownership and permissions
            sudo chown -R ${{ secrets.PROD_SERVER_USER }}:${{ secrets.PROD_SERVER_USER }} /home/${{ secrets.PROD_SERVER_USER }}/Badge-Viewer
            sudo chmod -R 755 /home/${{ secrets.PROD_SERVER_USER }}/Badge-Viewer

            # First run the backend
            cd backend
            if [ -f package-lock.json ]; then
              npm ci --cache ~/.npm_cache --prefer-offline
            else
              npm install --cache ~/.npm_cache --prefer-offline
            fi

            pm2 describe Badge-Viewer-Backend > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload Badge-Viewer-Backend
            else
              pm2 start npm --name "Badge-Viewer-Backend" -- start
            fi
            pm2 save
            pm2 startup

            # Now move to frontend, build and start the PM2 process
            cd ../frontend
            if [ -f package-lock.json ]; then
              npm ci --cache ~/.npm_cache --prefer-offline
            else
              npm install --cache ~/.npm_cache --prefer-offline
            fi

            npm run build

            pm2 describe Badge-Viewer-Frontend > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload Badge-Viewer-Frontend
            else
              pm2 start npm --name "Badge-Viewer-Frontend" -- start
            fi
            pm2 save
            pm2 startup

            # Clean up
            rm -rf /home/${{ secrets.PROD_SERVER_USER }}/deploy.zip
